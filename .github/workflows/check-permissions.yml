name: "Check Permissions (Reusable)"

on:
  workflow_call:
    inputs:
      team_slug:
        description: "GitHub team slug to check membership against"
        required: true
        type: string
      environment:
        description: "Target deployment environment (staging/production)"
        required: true
        type: string
    outputs:
      is-allowed:
        description: "Whether the actor is allowed to deploy"
        value: ${{ jobs.check-permissions.outputs.is-allowed }}
    secrets:
      ORG_PAT_TOKEN:
        description: "PAT token with read:org permission"
        required: true

jobs:
  # ----------------------------------
  # JOB 1 - Check team membership
  # ----------------------------------
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      is-allowed: ${{ steps.check.outputs.is-allowed }}
    steps:
      - name: Check if actor is member of ${{ inputs.team_slug }}
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PAT_TOKEN }}
          script: |
            const org = context.repo.owner;
            const team_slug = '${{ inputs.team_slug }}';
            const actor = context.actor;
            const environment = '${{ inputs.environment }}';

            console.log(`Checking membership for user: ${actor}`);
            console.log(`Organization: ${org}`);
            console.log(`Team: ${team_slug}`);
            console.log(`Target environment: ${environment}`);

            try {
              const membership = await github.rest.teams.getMembershipForUserInOrg({
                org: org,
                team_slug: team_slug,
                username: actor,
              });

              if (membership.data.state === 'active') {
                console.log(`✅ User ${actor} is an active member of ${team_slug}`);
                console.log(`✅ Deployment to ${environment} is ALLOWED`);
                core.setOutput('is-allowed', 'true');
              } else {
                console.log(`⚠️ User ${actor} membership state: ${membership.data.state}`);
                console.log(`❌ Deployment to ${environment} is DENIED`);
                core.setOutput('is-allowed', 'false');
              }

            } catch (error) {
              console.log(`❌ User ${actor} is NOT a member of ${team_slug}`);
              console.log(`❌ Deployment to ${environment} is DENIED`);
              console.log(`Error: ${error.message}`);
              core.setOutput('is-allowed', 'false');
            }

  # ----------------------------------
  # JOB 2 - Notify if denied
  # ----------------------------------
  notify-denied:
    runs-on: ubuntu-latest
    needs: check-permissions
    if: needs.check-permissions.outputs.is-allowed == 'false'
    steps:
      - name: Notify deployment denied
        run: |
          echo "⛔ Deployment to ${{ inputs.environment }} was DENIED"
          echo "Actor: ${{ github.actor }}"
          echo "Only members of team '${{ inputs.team_slug }}' are allowed to deploy"
          exit 1
