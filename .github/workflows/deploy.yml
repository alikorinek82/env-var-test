name: "Deploy"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ----------------------------------
  # JOB 1 - Build (kdokoliv může spustit)
  # ----------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: echo "Building... triggered by ${{ github.actor }}"

  # ----------------------------------
  # JOB 2 - Required workflow check (staging)
  # Automaticky vynuceno přes GitHub Enterprise
  # Required Workflows nastavení v Organization Settings
  # ----------------------------------
  check-permissions-staging:
    needs: build
    uses: org/central-workflows/.github/workflows/required-deployment-check.yml@main
    with:
      team_slug: 'team-a'       # ← uprav na název svého týmu
      environment: 'staging'
    secrets:
      ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}

  # ----------------------------------
  # JOB 3 - Deploy to Staging
  # ----------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: check-permissions-staging
    if: needs.check-permissions-staging.outputs.is-allowed == 'true'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: echo "Deploying to staging... triggered by ${{ github.actor }}"

      - name: Print environment variable
        run: echo "Staging URL is ${{ vars.STAGING_URL }}"

      - name: Check environment secret
        run: |
          if [ -z "${{ secrets.STAGING_API_KEY }}" ]; then
            echo "Secret STAGING_API_KEY is EMPTY"
          else
            echo "Secret STAGING_API_KEY is SET (value is masked)"
          fi

  # ----------------------------------
  # JOB 4 - Required workflow check (production)
  # ----------------------------------
  check-permissions-production:
    needs: deploy-staging
    uses: org/central-workflows/.github/workflows/required-deployment-check.yml@main
    with:
      team_slug: 'team-a'       # ← uprav na název svého týmu
      environment: 'production'
    secrets:
      ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}

  # ----------------------------------
  # JOB 5 - Deploy to Production
  # ----------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: check-permissions-production
    if: needs.check-permissions-production.outputs.is-allowed == 'true'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: echo "Deploying to production... triggered by ${{ github.actor }}"

      - name: Print environment variable
        run: echo "Production URL is ${{ vars.PRODUCTION_URL }}"

      - name: Check environment secret
        run: |
          if [ -z "${{ secrets.PRODUCTION_API_KEY }}" ]; then
            echo "Secret PRODUCTION_API_KEY is EMPTY"
          else
            echo "Secret PRODUCTION_API_KEY is SET (value is masked)"
          fi
