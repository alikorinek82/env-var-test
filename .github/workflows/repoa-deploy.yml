name: "Repo A - Deploy"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ----------------------------------
  # JOB 1 - Build
  # ----------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: echo "Building Repo A... triggered by ${{ github.actor }}"

  # ----------------------------------
  # JOB 2 - Check permissions (calls central workflow)
  # ----------------------------------
  check-permissions:
    needs: build
    uses: org/central-workflows/.github/workflows/check-permissions.yml@main
    # ↑ replace "org" with your actual organization name
    with:
      team_slug: 'team-a'       # replace with your actual team slug
      environment: 'staging'
    secrets:
      ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}

  # ----------------------------------
  # JOB 3 - Deploy to Staging
  # ----------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: check-permissions
    if: needs.check-permissions.outputs.is-allowed == 'true'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: echo "Deploying Repo A to staging... triggered by ${{ github.actor }}"

      - name: Print staging environment variable
        run: echo "Staging URL is ${{ vars.STAGING_URL }}"

      - name: Check staging secret
        run: |
          if [ -z "${{ secrets.STAGING_API_KEY }}" ]; then
            echo "Secret STAGING_API_KEY is EMPTY"
          else
            echo "Secret STAGING_API_KEY is SET (value is masked)"
          fi

  # ----------------------------------
  # JOB 4 - Check permissions for production
  # ----------------------------------
  check-permissions-production:
    needs: deploy-staging
    uses: org/central-workflows/.github/workflows/check-permissions.yml@main
    # ↑ replace "org" with your actual organization name
    with:
      team_slug: 'team-a'       # replace with your actual team slug
      environment: 'production'
    secrets:
      ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}

  # ----------------------------------
  # JOB 5 - Deploy to Production
  # ----------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: check-permissions-production
    if: needs.check-permissions-production.outputs.is-allowed == 'true'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: echo "Deploying Repo A to production... triggered by ${{ github.actor }}"

      - name: Print production environment variable
        run: echo "Production URL is ${{ vars.PRODUCTION_URL }}"

      - name: Check production secret
        run: |
          if [ -z "${{ secrets.PRODUCTION_API_KEY }}" ]; then
            echo "Secret PRODUCTION_API_KEY is EMPTY"
          else
            echo "Secret PRODUCTION_API_KEY is SET (value is masked)"
          fi
